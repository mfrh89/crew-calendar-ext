<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Filled navy circle -->
  <circle cx="64" cy="64" r="62" fill="#05164D"/>

  <!-- Calendar body border (white) -->
  <rect x="24" y="30" width="80" height="72" rx="6" ry="6" fill="#05164D" stroke="white" stroke-width="4"/>

  <!-- Calendar header bar (white, slim) -->
  <rect x="24" y="30" width="80" height="16" rx="6" ry="6" fill="white"/>
  <rect x="24" y="38" width="80" height="8" fill="white"/>

  <!-- Ring hooks (white) -->
  <rect x="39" y="18" width="11" height="20" rx="5.5" fill="white"/>
  <rect x="78" y="18" width="11" height="20" rx="5.5" fill="white"/>

  <!-- 3×2 grid — dots 12×12, all gaps exactly 10px -->
  <rect x="36" y="56" width="14" height="14" rx="2.5" fill="white"/>
  <rect x="58" y="56" width="14" height="14" rx="2.5" fill="white"/>
  <rect x="80" y="56" width="14" height="14" rx="2.5" fill="white"/>

  <rect x="36" y="78" width="14" height="14" rx="2.5" fill="white"/>
  <rect x="58" y="78" width="14" height="14" rx="2.5" fill="white"/>
  <rect x="80" y="78" width="14" height="14" rx="2.5" fill="white"/>
</svg>
