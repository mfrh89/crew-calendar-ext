<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- White circle with thin navy border -->
  <circle cx="64" cy="64" r="61" fill="white" stroke="#05164D" stroke-width="4.5"/>

  <!-- Calendar body -->
  <rect x="28" y="30" width="72" height="70" rx="5" ry="5" fill="white" stroke="#05164D" stroke-width="4.5"/>

  <!-- Calendar header bar -->
  <rect x="28" y="30" width="72" height="22" rx="5" ry="5" fill="#05164D"/>
  <rect x="28" y="42" width="72" height="10" fill="#05164D"/>

  <!-- Ring hooks -->
  <rect x="43" y="20" width="8" height="18" rx="4" fill="#05164D"/>
  <rect x="77" y="20" width="8" height="18" rx="4" fill="#05164D"/>

  <!-- 3×2 grid -->
  <!-- Row 1 -->
  <rect x="35" y="61" width="15" height="13" rx="2.5" fill="#05164D"/>
  <rect x="57" y="61" width="15" height="13" rx="2.5" fill="#05164D"/>
  <rect x="78" y="61" width="15" height="13" rx="2.5" fill="#05164D"/>
  <!-- Row 2 -->
  <rect x="35" y="78" width="15" height="13" rx="2.5" fill="#05164D"/>
  <rect x="57" y="78" width="15" height="13" rx="2.5" fill="#05164D"/>
  <rect x="78" y="78" width="15" height="13" rx="2.5" fill="#05164D"/>
</svg>
