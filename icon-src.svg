<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Filled navy circle -->
  <circle cx="64" cy="64" r="62" fill="#05164D"/>

  <!-- Calendar body border (white) -->
  <rect x="24" y="30" width="80" height="72" rx="6" ry="6" fill="#05164D" stroke="white" stroke-width="4"/>

  <!-- Calendar header bar (white, slim) -->
  <rect x="24" y="30" width="80" height="16" rx="6" ry="6" fill="white"/>
  <rect x="24" y="38" width="80" height="8" fill="white"/>

  <!-- Ring hooks (white) -->
  <rect x="39" y="18" width="11" height="20" rx="5.5" fill="white"/>
  <rect x="78" y="18" width="11" height="20" rx="5.5" fill="white"/>

  <!-- 3×3 grid of white dots -->
  <rect x="34" y="53" width="14" height="13" rx="2.5" fill="white"/>
  <rect x="57" y="53" width="14" height="13" rx="2.5" fill="white"/>
  <rect x="80" y="53" width="14" height="13" rx="2.5" fill="white"/>

  <rect x="34" y="70" width="14" height="13" rx="2.5" fill="white"/>
  <rect x="57" y="70" width="14" height="13" rx="2.5" fill="white"/>
  <rect x="80" y="70" width="14" height="13" rx="2.5" fill="white"/>

  <rect x="34" y="87" width="14" height="11" rx="2.5" fill="white"/>
  <rect x="57" y="87" width="14" height="11" rx="2.5" fill="white"/>
  <rect x="80" y="87" width="14" height="11" rx="2.5" fill="white"/>
</svg>
