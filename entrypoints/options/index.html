<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crew Calendar - Settings</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Crew Calendar Settings</h1>

      <section>
        <h2>Calendars</h2>
        <p class="hint">Paste the iCal/ICS URL from your calendar provider. You can add multiple calendars.</p>

        <div id="calendarList"></div>

        <div class="add-calendar">
          <input type="url" id="newCalUrl" placeholder="https://calendar.google.com/calendar/ical/…/basic.ics" />
          <input type="text" id="newCalName" placeholder="Name (optional)" />
          <div class="color-row">
            <label for="newCalColor">Color</label>
            <input type="color" id="newCalColor" value="#4285f4" />
            <button id="testUrl" type="button">Test</button>
            <button id="addCal" type="button" class="primary">Add</button>
          </div>
          <div id="testStatus" class="status" hidden></div>
        </div>
      </section>

      <section>
        <h2>Target URL</h2>
        <div class="field">
          <label for="targetUrl">Airline Tool URL Pattern</label>
          <input type="text" id="targetUrl" placeholder="https://crew.airline.com/*" />
          <small>Use * as wildcard. The calendar strip only appears on pages matching this pattern.</small>
        </div>
      </section>

      <section>
        <h2>Display</h2>
        <div class="field">
          <label for="stripPosition">Strip Position</label>
          <select id="stripPosition">
            <option value="below">Below day bar</option>
            <option value="above">Above day bar</option>
          </select>
        </div>
        <div class="field">
          <label for="syncInterval">Sync Interval (minutes)</label>
          <select id="syncInterval">
            <option value="15">15</option>
            <option value="30" selected>30</option>
            <option value="60">60</option>
          </select>
        </div>
      </section>

      <div class="actions">
        <button id="save" type="button" class="primary">Save</button>
        <span id="saveStatus"></span>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
